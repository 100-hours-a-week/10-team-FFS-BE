name: Backend CI

# ============================================================
# 트리거 설정: PR이 생성/업데이트될 때 + 브랜치 푸시 시 자동 실행
# ============================================================
on:
  # PR 이벤트 (코드 검증용)
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - dev-v1
    # 백엔드 관련 파일이 변경될 때만 실행
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - '.github/workflows/backend-ci.yml'

  # Push 이벤트 (CD 트리거용)
  push:
    branches:
      - dev-v1
      - main
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

# ============================================================
# 동시성 제어: 같은 PR 또는 브랜치에서 새 실행 시 이전 실행 취소
# ============================================================
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ============================================================
# CI 작업 정의
# ============================================================
jobs:
  backend-ci:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # ========================================================
    # MySQL 서비스 컨테이너 (테스트용 데이터베이스)
    # ========================================================
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s

    # ========================================================
    # 환경 변수 설정 (application-ci.yml에서 사용)
    # ========================================================
    env:
      SPRING_PROFILES_ACTIVE: ci
      DB_HOST: localhost
      DB_PORT: 3306
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USERNAME: root
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    # ========================================================
    # CI 단계 (Steps)
    # ========================================================
    steps:
      # ------------------------------------------------------
      # 1. 소스 코드 체크아웃
      # ------------------------------------------------------
      - name: 📥 Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------
      # 2. JDK 설정 및 Gradle 캐싱
      # ------------------------------------------------------
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # ------------------------------------------------------
      # 3. Gradle 실행 권한 부여
      # ------------------------------------------------------
      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      # ------------------------------------------------------
      # 4. 정적 분석 - Checkstyle
      # ------------------------------------------------------
      - name: 🔍 Run Checkstyle
        id: checkstyle
        run: ./gradlew checkstyleMain checkstyleTest
        continue-on-error: false

      # ------------------------------------------------------
      # 5. 빌드 (테스트 제외)
      # ------------------------------------------------------
      - name: 🏗️ Build with Gradle
        id: build
        run: ./gradlew clean build -x test

      # ------------------------------------------------------
      # 6. 테스트 실행 및 커버리지 측정
      # ------------------------------------------------------
      - name: 🧪 Run tests with coverage
        id: test
        run: ./gradlew test jacocoTestReport --parallel

      # ------------------------------------------------------
      # 7. 테스트 커버리지 검증
      # ------------------------------------------------------
      - name: 📊 Verify test coverage
        id: coverage
        run: |
          ./gradlew jacocoTestCoverageVerification || true
          
          # 커버리지 추출
          if [ -f build/reports/jacoco/test/html/index.html ]; then
            COVERAGE=$(grep -oP 'Total.*?([0-9]+)%' build/reports/jacoco/test/html/index.html | grep -oP '[0-9]+' | head -1 || echo "0")
          else
            COVERAGE="0"
          fi
          
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "### 📊 Test Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          
          # 커버리지가 너무 낮으면 경고
          if [ "$COVERAGE" -lt 70 ]; then
            echo "::warning::Test coverage is below 70% (${COVERAGE}%)"
          fi
        continue-on-error: true

      # ------------------------------------------------------
      # 8. 테스트 결과 발행
      # ------------------------------------------------------
      - name: 📋 Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            build/test-results/**/*.xml
          check_name: Test Results
          comment_mode: off

      # ------------------------------------------------------
      # 9. 테스트 리포트 업로드 (실패 시)
      # ------------------------------------------------------
      - name: 📤 Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.event.pull_request.head.sha }}
          path: |
            build/reports/tests/test/
            build/reports/jacoco/test/html/
          retention-days: 7

      # ------------------------------------------------------
      # 10. JAR 파일 저장 (main PR/Push)
      # ------------------------------------------------------
      - name: 📦 Upload build artifact (main)
        if: (github.base_ref == 'main' || github.ref_name == 'main') && success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-main-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/libs/*.jar
          retention-days: 90

      # ------------------------------------------------------
      # 11. JAR 파일 저장 (dev PR/Push)
      # ------------------------------------------------------
      - name: 📦 Upload build artifact (dev)
        if: (github.base_ref == 'dev-v1' || github.ref_name == 'dev-v1') && success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-dev-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/libs/*.jar
          retention-days: 7

      # ------------------------------------------------------
      # 12. 빌드 정보 저장 (CD에서 사용)
      # ------------------------------------------------------
      - name: 💾 Save build metadata
        if: success()
        run: |
          mkdir -p build-info
          cat > build-info/metadata.json <<EOF
          {
            "buildTime": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "commitSha": "${{ github.event.pull_request.head.sha || github.sha }}",
            "commitShort": "$(echo ${{ github.event.pull_request.head.sha || github.sha }} | cut -c1-7)",
            "branch": "${{ github.head_ref || github.ref_name }}",
            "baseBranch": "${{ github.base_ref || github.ref_name }}",
            "prNumber": "${{ github.event.pull_request.number || 'N/A' }}",
            "prTitle": "${{ github.event.pull_request.title || 'Direct Push' }}",
            "author": "${{ github.event.pull_request.user.login || github.actor }}",
            "coverage": "${{ steps.coverage.outputs.coverage }}"
          }
          EOF
          cat build-info/metadata.json

      - name: 📤 Upload build metadata
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-${{ github.event.pull_request.head.sha || github.sha }}
          path: build-info/metadata.json
          retention-days: 30

      # ------------------------------------------------------
      # 13. PR에 결과 코멘트 작성
      # ------------------------------------------------------
      - name: 💬 Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.coverage }}' || 'N/A';
            const checkstyle = '${{ steps.checkstyle.outcome }}';
            const build = '${{ steps.build.outcome }}';
            const test = '${{ steps.test.outcome }}';
            
            const getIcon = (status) => status === 'success' ? '✅' : status === 'failure' ? '❌' : '⚠️';
            
            const getCoverageColor = (cov) => {
              const num = parseInt(cov);
              if (num >= 80) return '🟢';
              if (num >= 70) return '🟡';
              return '🔴';
            };
            
            const body = `## 🔍 Backend CI Results
            
            | Check | Status | Details |
            |-------|--------|---------|
            | 🔍 Code Style | ${getIcon(checkstyle)} ${checkstyle} | Checkstyle 검사 |
            | 🏗️ Build | ${getIcon(build)} ${build} | Gradle 빌드 |
            | 🧪 Tests | ${getIcon(test)} ${test} | 단위 테스트 |
            | 📊 Coverage | ${getCoverageColor(coverage)} ${coverage}% | 테스트 커버리지 |
            
            <details>
            <summary>📋 상세 정보</summary>
            
            - **브랜치:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`
            - **커밋:** \`${context.payload.pull_request.head.sha.substring(0, 7)}\`
            - **작성자:** @${{ github.event.pull_request.user.login }}
            
            ### 📊 테스트 커버리지 기준
            - 🟢 80% 이상: 우수
            - 🟡 70-79%: 양호
            - 🔴 70% 미만: 개선 필요
            
            [📊 전체 리포트 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            </details>
            
            ${coverage < 70 ? '\n⚠️ **주의:** 테스트 커버리지가 기준(70%)에 미달합니다.' : ''}
            ${test === 'failure' ? '\n❌ **테스트 실패:** 실패한 테스트를 확인해주세요.' : ''}
            `;
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Backend CI Results')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      # ------------------------------------------------------
      # 14. Discord 알림 - 성공 (PR only)
      # ------------------------------------------------------
      - name: 📢 Send Discord notification on success
        if: success() && github.event_name == 'pull_request'
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CI Bot"
          avatar-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          embed-title: "✅ Backend CI 성공"
          embed-description: |
            **PR:** #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}
            **브랜치:** `${{ github.head_ref }}` → `${{ github.base_ref }}`
            **작성자:** @${{ github.event.pull_request.user.login }}
            **커버리지:** ${{ steps.coverage.outputs.coverage }}%
            
            모든 검사를 통과했습니다! 🎉
            
            [🔗 PR 보기](${{ github.event.pull_request.html_url }})
          embed-color: 3066993
          embed-footer-text: ${{ github.repository }}
          embed-timestamp: ${{ github.event.pull_request.updated_at }}

      # ------------------------------------------------------
      # 15. Discord 알림 - 실패 (PR only)
      # ------------------------------------------------------
      - name: 📢 Send Discord notification on failure
        if: failure() && github.event_name == 'pull_request'
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CI Bot"
          avatar-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          embed-title: "❌ Backend CI 실패"
          embed-description: |
            **PR:** #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}
            **브랜치:** `${{ github.head_ref }}` → `${{ github.base_ref }}`
            **작성자:** @${{ github.event.pull_request.user.login }}
            
            **실패 단계:**
            • Code Style: ${{ steps.checkstyle.outcome }}
            • Build: ${{ steps.build.outcome }}
            • Tests: ${{ steps.test.outcome }}
            
            [🔗 PR 보기](${{ github.event.pull_request.html_url }})
            [📋 CI 로그 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 15158332
          embed-footer-text: ${{ github.repository }}
          embed-timestamp: ${{ github.event.pull_request.updated_at }}