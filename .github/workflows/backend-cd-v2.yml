          GREEN_ASG="${{ steps.green-asg.outputs.green_asg_name }}"
          if [ -n "$GREEN_ASG" ]; then
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name ${GREEN_ASG} \
              --min-size 0 --max-size 0 --desired-capacity 0 || true
            sleep 10
            aws autoscaling delete-auto-scaling-group \
              --auto-scaling-group-name ${GREEN_ASG} \
              --force-delete || true
          fi

          echo "⚠️ Chat Prod Rollback completed"

      - name: Send Discord notification on success
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          embed-title: "✅ [Chat] Production 배포 성공 (Blue → Green)"
          embed-description: |
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            **Green ASG:** `${{ steps.green-asg.outputs.green_asg_name }}`
            **Blue ASG (삭제됨):** `${{ steps.blue-check.outputs.blue_asg }}`
            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 3066993

      - name: Send Discord notification on failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          embed-title: "❌ [Chat] Production 배포 실패 - 롤백됨"
          embed-description: |
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 15158332
