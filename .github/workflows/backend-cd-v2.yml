      #     FAIL_COUNT=0
      #
      #     for i in {1..15}; do
      #       echo "Monitoring... $i/15 minutes"
      #
      #       UNHEALTHY=$(aws elbv2 describe-target-health \
      #         --target-group-arn ${GREEN_TG_ARN} \
      #         --query 'TargetHealthDescriptions[?TargetHealth.State==`unhealthy`]' \
      #         --output json | jq 'length')
      #
      #       if [ "$UNHEALTHY" -gt 0 ]; then
      #         FAIL_COUNT=$((FAIL_COUNT + 1))
      #         echo "⚠️ Unhealthy detected ($FAIL_COUNT times)"
      #       else
      #         FAIL_COUNT=0
      #       fi
      #
      #       if [ "$FAIL_COUNT" -ge 3 ]; then
      #         echo "❌ 3 consecutive unhealthy checks. Failing deployment."
      #         exit 1
      #       fi
      #
      #       sleep 60
      #     done
      #
      #     echo "✅ 50% traffic monitoring passed"

      - name: Switch traffic Blue → Green
        id: traffic-switch
        run: |
          CHAT_RULE_ARN="${{ steps.blue-check.outputs.chat_rule_arn }}"
          CHAT_API_RULE_ARN="${{ steps.blue-check.outputs.chat_api_rule_arn }}"
          BLUE_TG_ARN="${{ steps.blue-check.outputs.blue_tg_arn }}"
          GREEN_TG_ARN="${{ steps.blue-check.outputs.green_tg_arn }}"

          # /ws* 규칙 전환
          aws elbv2 modify-rule \
            --rule-arn ${CHAT_RULE_ARN} \
            --actions "[{
              \"Type\": \"forward\",
              \"ForwardConfig\": {
                \"TargetGroups\": [
                  {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 0},
                  {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 100}
                ]
              }
            }]"

          # /api/v2/chat* 규칙 전환
          aws elbv2 modify-rule \
            --rule-arn ${CHAT_API_RULE_ARN} \
            --actions "[{
              \"Type\": \"forward\",
              \"ForwardConfig\": {
                \"TargetGroups\": [
                  {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 0},
                  {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 100}
                ]
              }
            }]"

          echo "✅ Traffic switched: Blue(0%) → Green(100%) for both /ws* and /api/v2/chat*"
          echo "### ✅ Traffic: Green 100%" >> $GITHUB_STEP_SUMMARY

      # === CANARY FINAL MONITORING (Chat) ===
      # - name: "Canary: Final monitoring after 100% switch (10 min)"
      #   run: |
      #     echo "=== Final monitoring on Green (zero tolerance) ==="
      #     GREEN_TG_ARN="${{ steps.blue-check.outputs.green_tg_arn }}"
      #
      #     for i in {1..10}; do
      #       echo "Final check... $i/10 minutes"
      #
      #       UNHEALTHY=$(aws elbv2 describe-target-health \
      #         --target-group-arn ${GREEN_TG_ARN} \
      #         --query 'TargetHealthDescriptions[?TargetHealth.State==`unhealthy`]' \
      #         --output json | jq 'length')
      #
      #       if [ "$UNHEALTHY" -gt 0 ]; then
      #         echo "❌ Unhealthy target detected in final monitoring!"
      #         exit 1
      #       fi
      #
      #       sleep 60
      #     done
      #
      #     echo "✅ Final monitoring passed"

      # -------------------------------------------------------
      # 11. Promote Green → Blue
      # -------------------------------------------------------
      - name: Promote Green to Blue
        id: promote
        run: |
          GREEN_ASG="${{ steps.green-asg.outputs.green_asg_name }}"
          BLUE_TG_ARN="${{ steps.blue-check.outputs.blue_tg_arn }}"
          GREEN_TG_ARN="${{ steps.blue-check.outputs.green_tg_arn }}"
          CHAT_RULE_ARN="${{ steps.blue-check.outputs.chat_rule_arn }}"
          CHAT_API_RULE_ARN="${{ steps.blue-check.outputs.chat_api_rule_arn }}"
          EXPECTED=${{ steps.blue-check.outputs.blue_desired }}

          echo "=== Promoting Green to Blue ==="

          # 1. Green ASG를 Blue TG에 연결
          aws autoscaling attach-load-balancer-target-groups \
            --auto-scaling-group-name ${GREEN_ASG} \
            --target-group-arns ${BLUE_TG_ARN}

          echo "Waiting for Green instances to register in Blue TG..."
          sleep 30

          # 2. Blue TG에서 healthy 확인
          for i in {1..20}; do
            HEALTHY_IN_BLUE=$(aws elbv2 describe-target-health \
              --target-group-arn ${BLUE_TG_ARN} \
              --query 'TargetHealthDescriptions[?TargetHealth.State==`healthy`]' \
              --output json | jq 'length')

            echo "[$i/20] Healthy in Blue TG: ${HEALTHY_IN_BLUE}/${EXPECTED}"

            if [ "$HEALTHY_IN_BLUE" -ge "$EXPECTED" ]; then
              echo "✅ Green instances healthy in Blue TG"
              break
            fi

            if [ "$i" -eq 20 ]; then
              echo "❌ Green instances not healthy in Blue TG"
              exit 1
            fi

            sleep 10
          done

          # 3. Listener를 Blue TG로 복구
          aws elbv2 modify-rule \
            --rule-arn "$CHAT_RULE_ARN" \
            --actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 100},
                    {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 0}
                  ]
                }
              }
            ]"

            aws elbv2 modify-rule \
            --rule-arn "$CHAT_API_RULE_ARN" \
            --actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 100},
                    {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 0}
                  ]
                }
              }
            ]"

          echo "✅ Promote complete"
          echo "### 🔵 Green → Blue 승격 완료" >> $GITHUB_STEP_SUMMARY
          echo "- **New Blue ASG:** \`${GREEN_ASG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Listener:** → Blue TG" >> $GITHUB_STEP_SUMMARY

      # -------------------------------------------------------
      # 12. Old Blue ASG 삭제
      # -------------------------------------------------------
      - name: Remove Blue Chat ASG
        if: success() && steps.blue-check.outputs.blue_asg != 'none'
        run: |
          BLUE_ASG="${{ steps.blue-check.outputs.blue_asg }}"

          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${BLUE_ASG} \
            --min-size 0 --max-size 0 --desired-capacity 0

          sleep 30

          aws autoscaling delete-auto-scaling-group \
            --auto-scaling-group-name ${BLUE_ASG} \
            --force-delete

          echo "✅ Blue Chat ASG removed: ${BLUE_ASG}"

      # ------------------------------------------------------
      # 13. 배포 정보 기록
      # ------------------------------------------------------
      - name: Record deployment info
        if: success()
        run: |
          cat > deployment-info.json <<EOF
          {
            "environment": "production",
            "service", "chat",
            "deployment_strategy": "weighted-blue-green",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "image_uri": "${{ steps.image.outputs.image_uri }}",
            "image_tag": "${{ steps.image.outputs.image_tag }}",
            "new_asg": "${{ steps.green-asg.outputs.green_asg_name }}",
            "old_blue_asg": "${{ steps.blue-check.outputs.blue_asg }}",
            "traffic_shift": "10% → 50% → 100%",
            "listener_state": "Blue TG (promoted from Green)"
          }
          EOF
          cat deployment-info.json

      # ------------------------------------------------------
      # 14. 롤백 (실패 시 즉시 Blue로)
      # ------------------------------------------------------
      - name: Rollback on failure
        if: failure()
        run: |
          CHAT_RULE_ARN="${{ steps.blue-check.outputs.chat_rule_arn }}"
          CHAT_API_RULE_ARN="${{ steps.blue-check.outputs.chat_api_rule_arn }}"
          BLUE_TG_ARN="${{ steps.blue-check.outputs.blue_tg_arn }}"
          GREEN_TG_ARN="${{ steps.blue-check.outputs.green_tg_arn }}"

          # === CANARY ROLLBACK (Chat) ===
          # 카나리 단계에서 실패 시 Blue 100%로 원복 (두 규칙 모두)
          # if [ "${{ steps.canary-shift-10.outputs.canary_shifted }}" = "true" ]; then
          #   # /ws* 원복
          #   aws elbv2 modify-rule \
          #     --rule-arn ${CHAT_RULE_ARN} \
          #     --actions "[{
          #       \"Type\": \"forward\",
          #       \"ForwardConfig\": {
          #         \"TargetGroups\": [
          #           {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 100},
          #           {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 0}
          #         ]
          #       }
          #     }]" || true
          #   # /api/v2/chat* 원복
          #   aws elbv2 modify-rule \
          #     --rule-arn ${CHAT_API_RULE_ARN} \
          #     --actions "[{
          #       \"Type\": \"forward\",
          #       \"ForwardConfig\": {
          #         \"TargetGroups\": [
          #           {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 100},
          #           {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 0}
          #         ]
          #       }
          #     }]" || true
          #   echo "⚠️ Canary rollback: Traffic reverted to Blue 100%"
          # fi
          # === END CANARY ROLLBACK (Chat) ===

          # 트래픽이 이미 전환된 경우 원복 (두 규칙 모두)
          if [ "${{ steps.traffic-switch.outputs.traffic_switched }}" = "true" ]; then
            # /ws* 원복
            aws elbv2 modify-rule \
              --rule-arn ${CHAT_RULE_ARN} \
              --actions "[{
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 100},
                    {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 0}
                  ]
                }
              }]" || true
            # /api/v2/chat* 원복
            aws elbv2 modify-rule \
              --rule-arn ${CHAT_API_RULE_ARN} \
              --actions "[{
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 100},
                    {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 0}
                  ]
                }
              }]" || true
            echo "⚠️ Traffic reverted to Blue"
          fi

          # Green ASG 삭제
          GREEN_ASG="${{ steps.green-asg.outputs.green_asg_name }}"
          if [ -n "$GREEN_ASG" ]; then
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name ${GREEN_ASG} \
              --min-size 0 --max-size 0 --desired-capacity 0 || true

            sleep 10

            aws autoscaling delete-auto-scaling-group \
              --auto-scaling-group-name ${GREEN_ASG} \
              --force-delete || true
          fi

          echo "⚠️ Chat Prod Rollback completed"

      # ------------------------------------------------------
      # 15. Discord 알림
      # ------------------------------------------------------
      - name: Send Discord notification on success
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          avatar-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          embed-title: "✅ [Chat] Production 배포 성공 (Blue → Green)"
          embed-description: |
            **환경:** Production 🔴
            **전략:** Weighted Blue-Green
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            **New ASG:** `${{ steps.green-asg.outputs.green_asg_name }}`
            **Old Blue ASG:** `${{ steps.blue-check.outputs.blue_asg }}`

            ✅ 트래픽 전환 → Blue 승격 → Old Blue 삭제 완료!

            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 3066993

      - name: Send Discord notification on failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          avatar-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          embed-title: "❌ [Chat] Production 배포 실패 - 롤백됨"
          embed-description: |
            **환경:** Production 🔴
            **전략:** Weighted Blue-Green
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            ❌ 배포 실패 - Blue로 즉시 롤백됨

            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 15158332