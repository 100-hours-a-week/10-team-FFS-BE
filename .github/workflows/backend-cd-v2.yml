name: Backend CD V2

on:
  workflow_run:
    workflows: ["Backend CI V2"]
    types:
      - completed
    branches:
      - dev
      - main
      - "feat/#228-multiModule-migration"

permissions:
  contents: read
  actions: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2

# ============================================================
# Jobs
# ============================================================
jobs:
  # ============================================================
  # Staging API 배포 (dev 브랜치)
  # ASG 교체 방식
  # ============================================================
  deploy-staging-api:
    name: Deploy API to Staging
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'dev' || github.event.workflow_run.head_branch == 'feat/#228-multiModule-migration') &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging-api.klosetlab.site
    timeout-minutes: 30

    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API Docker metadata
        uses: actions/download-artifact@v4
        with:
          name: docker-metadata-api-${{ github.event.workflow_run.head_sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Extract image info
        id: image
        run: |
          if [ -f docker-metadata-api.json ]; then
            IMAGE_URI=$(cat docker-metadata-api.json | jq -r '.imageUri')
            IMAGE_TAG=$(cat docker-metadata-api.json | jq -r '.imageTag')
            VERSION=$(cat docker-metadata-api.json | jq -r '.version')

            echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
            echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT

            cat docker-metadata-api.json | jq '.'
          else
            echo "::error::API Docker metadata not found!"
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-StagingAPI-${{ github.run_id }}

      - name: Check current API environment
        id: current-check
        run: |
          LISTENER_ARN="${{ secrets.DEV_ALB_LISTENER_ARN }}"

          API_RULE_ARN=$(aws elbv2 describe-rules \
            --listener-arn ${LISTENER_ARN} \
            --query "Rules[?Conditions[?Field=='path-pattern' && contains(Values, '/api/*')]].RuleArn" \
            --output text)

          CURRENT_TG_ARN=$(aws elbv2 describe-rules \
            --rule-arns ${API_RULE_ARN} \
            --query 'Rules[0].Actions[0].ForwardConfig.TargetGroups[0].TargetGroupArn' \
            --output text)

          echo "current_tg_arn=${CURRENT_TG_ARN}" >> $GITHUB_OUTPUT

          ALL_ASGS=$(aws autoscaling describe-auto-scaling-groups \
            --query 'AutoScalingGroups[?starts_with(AutoScalingGroupName, `klosetlab-staging-v2-app-asg-`)].AutoScalingGroupName' \
            --output json)

          CURRENT_ASG="none"
          for asg in $(echo "$ALL_ASGS" | jq -r '.[]'); do
            TG_ARNS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$asg" \
              --query 'AutoScalingGroups[0].TargetGroupARNs' \
              --output json)

            if echo "$TG_ARNS" | jq -e --arg tg "$CURRENT_TG_ARN" 'index($tg)' > /dev/null; then
              CURRENT_ASG="$asg"
              break
            fi
          done

          echo "current_asg=${CURRENT_ASG}" >> $GITHUB_OUTPUT

          if [ "$CURRENT_ASG" != "none" ]; then
            DESIRED=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${CURRENT_ASG} \
              --query 'AutoScalingGroups[0].DesiredCapacity' \
              --output text)
            MIN=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${CURRENT_ASG} \
              --query 'AutoScalingGroups[0].MinSize' \
              --output text)
            MAX=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${CURRENT_ASG} \
              --query 'AutoScalingGroups[0].MaxSize' \
              --output text)
            echo "desired=${DESIRED}" >> $GITHUB_OUTPUT
            echo "min=${MIN}" >> $GITHUB_OUTPUT
            echo "max=${MAX}" >> $GITHUB_OUTPUT
          else
            echo "desired=1" >> $GITHUB_OUTPUT
            echo "min=1" >> $GITHUB_OUTPUT
            echo "max=2" >> $GITHUB_OUTPUT
          fi

      - name: Generate API User Data script
        id: userdata
        run: |
          chmod +x .github/scripts/generate-userdata.sh
          .github/scripts/generate-userdata.sh \
            "staging" \
            "${{ steps.image.outputs.image_uri }}" \
            "${{ env.AWS_REGION }}"

      - name: Create new Launch Template version
        id: new-lt
        run: |
          LT_ID="${{ secrets.DEV_LAUNCH_TEMPLATE_ID }}"
          USER_DATA="${{ steps.userdata.outputs.user_data_base64 }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          NEW_LT_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id ${LT_ID} \
            --source-version '$Latest' \
            --launch-template-data "{
              \"UserData\": \"${USER_DATA}\",
              \"TagSpecifications\": [{
                \"ResourceType\": \"instance\",
                \"Tags\": [
                  {\"Key\": \"Name\", \"Value\": \"klosetlab-staging-v2-app-${TIMESTAMP}\"},
                  {\"Key\": \"Environment\", \"Value\": \"staging\"},
                  {\"Key\": \"Service\", \"Value\": \"api\"},
                  {\"Key\": \"ImageTag\", \"Value\": \"${{ steps.image.outputs.image_tag }}\"}
                ]
              }]
            }" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)

          echo "new_lt_version=${NEW_LT_VERSION}" >> $GITHUB_OUTPUT
          echo "✅ API Launch Template version ${NEW_LT_VERSION} created"

      - name: Create new API ASG
        id: new-asg
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          NEW_ASG_NAME="klosetlab-staging-v2-app-asg-${TIMESTAMP}"
          CURRENT_TG_ARN="${{ steps.current-check.outputs.current_tg_arn }}"

          if [ -z "$CURRENT_TG_ARN" ] || [ "$CURRENT_TG_ARN" = "None" ]; then
            CURRENT_TG_ARN="${{ secrets.DEV_TARGET_GROUP_ARN }}"
          fi

          aws autoscaling create-auto-scaling-group \
            --auto-scaling-group-name ${NEW_ASG_NAME} \
            --launch-template "LaunchTemplateId=${{ secrets.DEV_LAUNCH_TEMPLATE_ID }},Version=${{ steps.new-lt.outputs.new_lt_version }}" \
            --min-size ${{ steps.current-check.outputs.min }} \
            --max-size ${{ steps.current-check.outputs.max }} \
            --desired-capacity ${{ steps.current-check.outputs.desired }} \
            --target-group-arns ${CURRENT_TG_ARN} \
            --vpc-zone-identifier "${{ secrets.DEV_SUBNET_IDS }}" \
            --health-check-type ELB \
            --health-check-grace-period 180 \
            --tags "Key=Name,Value=klosetlab-staging-v2-app,PropagateAtLaunch=true" \
                   "Key=Environment,Value=staging,PropagateAtLaunch=true" \
                   "Key=Service,Value=api,PropagateAtLaunch=true" \
                   "Key=ImageTag,Value=${{ steps.image.outputs.image_tag }},PropagateAtLaunch=true"

          echo "new_asg_name=${NEW_ASG_NAME}" >> $GITHUB_OUTPUT
          echo "### 🟢 New API ASG: ${NEW_ASG_NAME}" >> $GITHUB_STEP_SUMMARY

      - name: Wait for new API ASG to be ready
        timeout-minutes: 15
        run: |
          NEW_ASG="${{ steps.new-asg.outputs.new_asg_name }}"
          CURRENT_TG_ARN="${{ steps.current-check.outputs.current_tg_arn }}"
          EXPECTED=${{ steps.current-check.outputs.desired }}

          if [ -z "$CURRENT_TG_ARN" ] || [ "$CURRENT_TG_ARN" = "None" ]; then
            CURRENT_TG_ARN="${{ secrets.DEV_TARGET_GROUP_ARN }}"
          fi

          MAX_RETRIES=90
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HEALTHY_INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${NEW_ASG} \
              --query 'AutoScalingGroups[0].Instances[?HealthStatus==`Healthy` && LifecycleState==`InService`]' \
              --output json | jq 'length')

            NEW_INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${NEW_ASG} \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
              --output json)

            HEALTHY_TARGETS=0
            for instance_id in $(echo "$NEW_INSTANCE_IDS" | jq -r '.[]'); do
              STATE=$(aws elbv2 describe-target-health \
                --target-group-arn ${CURRENT_TG_ARN} \
                --targets Id=${instance_id} \
                --query 'TargetHealthDescriptions[0].TargetHealth.State' \
                --output text 2>/dev/null || echo "unknown")
              if [ "$STATE" = "healthy" ]; then
                HEALTHY_TARGETS=$((HEALTHY_TARGETS + 1))
              fi
            done

            echo "[$((RETRY_COUNT + 1))/$MAX_RETRIES] Healthy: ${HEALTHY_INSTANCES} instances, ${HEALTHY_TARGETS} targets (expected: ${EXPECTED})"

            if [ "$HEALTHY_INSTANCES" -ge "$EXPECTED" ] && [ "$HEALTHY_TARGETS" -ge "$EXPECTED" ]; then
              echo "✅ New API ASG is ready!"
              exit 0
            fi

            sleep 10
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          echo "❌ New API ASG failed to become healthy"
          exit 1

      - name: Remove old API ASG
        if: success() && steps.current-check.outputs.current_asg != 'none'
        run: |
          OLD_ASG="${{ steps.current-check.outputs.current_asg }}"

          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${OLD_ASG} \
            --min-size 0 --max-size 0 --desired-capacity 0

          sleep 20

          aws autoscaling delete-auto-scaling-group \
            --auto-scaling-group-name ${OLD_ASG} \
            --force-delete

          echo "✅ Old API ASG removed: ${OLD_ASG}"

      - name: Rollback on failure
        if: failure() && steps.new-asg.outputs.new_asg_name != ''
        run: |
          NEW_ASG="${{ steps.new-asg.outputs.new_asg_name }}"
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${NEW_ASG} \
            --min-size 0 --max-size 0 --desired-capacity 0 || true
          sleep 10
          aws autoscaling delete-auto-scaling-group \
            --auto-scaling-group-name ${NEW_ASG} \
            --force-delete || true
          echo "⚠️ API Rollback completed"

      - name: Send Discord notification on success
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          embed-title: "✅ [API] Staging 배포 성공"
          embed-description: |
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            **New ASG:** `${{ steps.new-asg.outputs.new_asg_name }}`
            **Old ASG:** `${{ steps.current-check.outputs.current_asg }}`
            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 3066993

      - name: Send Discord notification on failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          embed-title: "❌ [API] Staging 배포 실패"
          embed-description: |
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 15158332

  # ============================================================
  # Staging Chat 배포 (dev 브랜치)
  # ASG 교체 방식
  # ============================================================
  deploy-staging-chat:
    name: Deploy Chat to Staging
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'dev' || github.event.workflow_run.head_branch == 'feat/#228-multiModule-migration') &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging-api.klosetlab.site
    timeout-minutes: 30

    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Chat Docker metadata
        uses: actions/download-artifact@v4
        with:
          name: docker-metadata-chat-${{ github.event.workflow_run.head_sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Extract image info
        id: image
        run: |
          if [ -f docker-metadata-chat.json ]; then
            IMAGE_URI=$(cat docker-metadata-chat.json | jq -r '.imageUri')
            IMAGE_TAG=$(cat docker-metadata-chat.json | jq -r '.imageTag')
            VERSION=$(cat docker-metadata-chat.json | jq -r '.version')

            echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
            echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT

            cat docker-metadata-chat.json | jq '.'
          else
            echo "::error::Chat Docker metadata not found!"
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-StagingChat-${{ github.run_id }}

      - name: Check current Chat environment
        id: current-check
        run: |
          CHAT_TG_ARN="${{ secrets.DEV_CHAT_TARGET_GROUP_ARN }}"
          echo "current_tg_arn=${CHAT_TG_ARN}" >> $GITHUB_OUTPUT

          ALL_ASGS=$(aws autoscaling describe-auto-scaling-groups \
            --query 'AutoScalingGroups[?starts_with(AutoScalingGroupName, `klosetlab-staging-v2-chat-asg-`)].AutoScalingGroupName' \
            --output json)

          # 기존에 timestamp 없는 ASG도 포함
          STATIC_ASG=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "klosetlab-staging-v2-chat-asg" \
            --query 'AutoScalingGroups[0].AutoScalingGroupName' \
            --output text 2>/dev/null || echo "None")

          CURRENT_ASG="none"

          # timestamp 붙은 ASG 중 chat-tg에 연결된 것 찾기
          for asg in $(echo "$ALL_ASGS" | jq -r '.[]'); do
            TG_ARNS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$asg" \
              --query 'AutoScalingGroups[0].TargetGroupARNs' \
              --output json)
            if echo "$TG_ARNS" | jq -e --arg tg "$CHAT_TG_ARN" 'index($tg)' > /dev/null; then
              CURRENT_ASG="$asg"
              break
            fi
          done

          # timestamp 없는 정적 ASG 확인
          if [ "$CURRENT_ASG" = "none" ] && [ "$STATIC_ASG" != "None" ]; then
            TG_ARNS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$STATIC_ASG" \
              --query 'AutoScalingGroups[0].TargetGroupARNs' \
              --output json)
            if echo "$TG_ARNS" | jq -e --arg tg "$CHAT_TG_ARN" 'index($tg)' > /dev/null; then
              CURRENT_ASG="$STATIC_ASG"
            fi
          fi

          echo "current_asg=${CURRENT_ASG}" >> $GITHUB_OUTPUT

          if [ "$CURRENT_ASG" != "none" ]; then
            DESIRED=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${CURRENT_ASG} \
              --query 'AutoScalingGroups[0].DesiredCapacity' --output text)
            MIN=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${CURRENT_ASG} \
              --query 'AutoScalingGroups[0].MinSize' --output text)
            MAX=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${CURRENT_ASG} \
              --query 'AutoScalingGroups[0].MaxSize' --output text)
            echo "desired=${DESIRED}" >> $GITHUB_OUTPUT
            echo "min=${MIN}" >> $GITHUB_OUTPUT
            echo "max=${MAX}" >> $GITHUB_OUTPUT
          else
            echo "desired=1" >> $GITHUB_OUTPUT
            echo "min=1" >> $GITHUB_OUTPUT
            echo "max=2" >> $GITHUB_OUTPUT
          fi

      - name: Generate Chat User Data script
        id: userdata
        run: |
          chmod +x .github/scripts/generate-userdata-chat.sh
          .github/scripts/generate-userdata-chat.sh \
            "staging" \
            "${{ steps.image.outputs.image_uri }}" \
            "${{ env.AWS_REGION }}"

      - name: Create new Chat Launch Template version
        id: new-lt
        run: |
          LT_ID="${{ secrets.DEV_CHAT_LAUNCH_TEMPLATE_ID }}"
          USER_DATA="${{ steps.userdata.outputs.user_data_base64 }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          NEW_LT_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id ${LT_ID} \
            --source-version '$Latest' \
            --launch-template-data "{
              \"UserData\": \"${USER_DATA}\",
              \"TagSpecifications\": [{
                \"ResourceType\": \"instance\",
                \"Tags\": [
                  {\"Key\": \"Name\", \"Value\": \"klosetlab-staging-v2-chat-${TIMESTAMP}\"},
                  {\"Key\": \"Environment\", \"Value\": \"staging\"},
                  {\"Key\": \"Service\", \"Value\": \"chat\"},
                  {\"Key\": \"ImageTag\", \"Value\": \"${{ steps.image.outputs.image_tag }}\"}
                ]
              }]
            }" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)

          echo "new_lt_version=${NEW_LT_VERSION}" >> $GITHUB_OUTPUT
          echo "✅ Chat Launch Template version ${NEW_LT_VERSION} created"

      - name: Create new Chat ASG
        id: new-asg
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          NEW_ASG_NAME="klosetlab-staging-v2-chat-asg-${TIMESTAMP}"
          CHAT_TG_ARN="${{ steps.current-check.outputs.current_tg_arn }}"

          aws autoscaling create-auto-scaling-group \
            --auto-scaling-group-name ${NEW_ASG_NAME} \
            --launch-template "LaunchTemplateId=${{ secrets.DEV_CHAT_LAUNCH_TEMPLATE_ID }},Version=${{ steps.new-lt.outputs.new_lt_version }}" \
            --min-size ${{ steps.current-check.outputs.min }} \
            --max-size ${{ steps.current-check.outputs.max }} \
            --desired-capacity ${{ steps.current-check.outputs.desired }} \
            --target-group-arns ${CHAT_TG_ARN} \
            --vpc-zone-identifier "${{ secrets.DEV_SUBNET_IDS }}" \
            --health-check-type ELB \
            --health-check-grace-period 180 \
            --tags "Key=Name,Value=klosetlab-staging-v2-chat,PropagateAtLaunch=true" \
                   "Key=Environment,Value=staging,PropagateAtLaunch=true" \
                   "Key=Service,Value=chat,PropagateAtLaunch=true" \
                   "Key=ImageTag,Value=${{ steps.image.outputs.image_tag }},PropagateAtLaunch=true"

          echo "new_asg_name=${NEW_ASG_NAME}" >> $GITHUB_OUTPUT
          echo "### 🟢 New Chat ASG: ${NEW_ASG_NAME}" >> $GITHUB_STEP_SUMMARY

      - name: Wait for new Chat ASG to be ready
        timeout-minutes: 15
        run: |
          NEW_ASG="${{ steps.new-asg.outputs.new_asg_name }}"
          CHAT_TG_ARN="${{ steps.current-check.outputs.current_tg_arn }}"
          EXPECTED=${{ steps.current-check.outputs.desired }}

          MAX_RETRIES=90
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HEALTHY_INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${NEW_ASG} \
              --query 'AutoScalingGroups[0].Instances[?HealthStatus==`Healthy` && LifecycleState==`InService`]' \
              --output json | jq 'length')

            NEW_INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${NEW_ASG} \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
              --output json)

            HEALTHY_TARGETS=0
            for instance_id in $(echo "$NEW_INSTANCE_IDS" | jq -r '.[]'); do
              STATE=$(aws elbv2 describe-target-health \
                --target-group-arn ${CHAT_TG_ARN} \
                --targets Id=${instance_id} \
                --query 'TargetHealthDescriptions[0].TargetHealth.State' \
                --output text 2>/dev/null || echo "unknown")
              if [ "$STATE" = "healthy" ]; then
                HEALTHY_TARGETS=$((HEALTHY_TARGETS + 1))
              fi
            done

            echo "[$((RETRY_COUNT + 1))/$MAX_RETRIES] Healthy: ${HEALTHY_INSTANCES} instances, ${HEALTHY_TARGETS} targets (expected: ${EXPECTED})"

            if [ "$HEALTHY_INSTANCES" -ge "$EXPECTED" ] && [ "$HEALTHY_TARGETS" -ge "$EXPECTED" ]; then
              echo "✅ New Chat ASG is ready!"
              exit 0
            fi

            sleep 10
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          echo "❌ New Chat ASG failed to become healthy"
          exit 1

      - name: Remove old Chat ASG
        if: success() && steps.current-check.outputs.current_asg != 'none'
        run: |
          OLD_ASG="${{ steps.current-check.outputs.current_asg }}"

          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${OLD_ASG} \
            --min-size 0 --max-size 0 --desired-capacity 0

          sleep 20

          aws autoscaling delete-auto-scaling-group \
            --auto-scaling-group-name ${OLD_ASG} \
            --force-delete

          echo "✅ Old Chat ASG removed: ${OLD_ASG}"

      - name: Rollback on failure
        if: failure() && steps.new-asg.outputs.new_asg_name != ''
        run: |
          NEW_ASG="${{ steps.new-asg.outputs.new_asg_name }}"
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${NEW_ASG} \
            --min-size 0 --max-size 0 --desired-capacity 0 || true
          sleep 10
          aws autoscaling delete-auto-scaling-group \
            --auto-scaling-group-name ${NEW_ASG} \
            --force-delete || true
          echo "⚠️ Chat Rollback completed"

      - name: Send Discord notification on success
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          embed-title: "✅ [Chat] Staging 배포 성공"
          embed-description: |
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            **New ASG:** `${{ steps.new-asg.outputs.new_asg_name }}`
            **Old ASG:** `${{ steps.current-check.outputs.current_asg }}`
            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 3066993

      - name: Send Discord notification on failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          embed-title: "❌ [Chat] Staging 배포 실패"
          embed-description: |
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 15158332

  # ============================================================
  # Production API 배포 (main 브랜치)
  # Blue/Green 방식
  # ============================================================
  deploy-prod-api:
    name: Deploy API to Production
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://klosetlab.site
    timeout-minutes: 60

    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API Docker metadata
        uses: actions/download-artifact@v4
        with:
          name: docker-metadata-api-${{ github.event.workflow_run.head_sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Extract image info
        id: image
        run: |
          if [ -f docker-metadata-api.json ]; then
            IMAGE_URI=$(cat docker-metadata-api.json | jq -r '.imageUri')
            IMAGE_TAG=$(cat docker-metadata-api.json | jq -r '.imageTag')
            VERSION=$(cat docker-metadata-api.json | jq -r '.version')

            echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
            echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT

            cat docker-metadata-api.json | jq '.'
          else
            echo "::error::API Docker metadata not found!"
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-ProdAPI-${{ github.run_id }}

      - name: Check Blue environment
        id: blue-check
        run: |
          LISTENER_ARN="${{ secrets.PROD_ALB_LISTENER_ARN }}"
          BLUE_TG_ARN="${{ secrets.PROD_BLUE_TARGET_GROUP_ARN }}"
          GREEN_TG_ARN="${{ secrets.PROD_GREEN_TARGET_GROUP_ARN }}"

          API_RULE_ARN=$(aws elbv2 describe-rules \
            --listener-arn ${LISTENER_ARN} \
            --query "Rules[?Conditions[?Field=='path-pattern' && contains(Values, '/api/*')]].RuleArn" \
            --output text)

          CURRENT_TG_ARN=$(aws elbv2 describe-rules \
            --rule-arns ${API_RULE_ARN} \
            --query 'Rules[0].Actions[0].ForwardConfig.TargetGroups[0].TargetGroupArn' \
            --output text)

          echo "api_rule_arn=${API_RULE_ARN}" >> $GITHUB_OUTPUT
          echo "blue_tg_arn=${BLUE_TG_ARN}" >> $GITHUB_OUTPUT
          echo "green_tg_arn=${GREEN_TG_ARN}" >> $GITHUB_OUTPUT

          if [ "$CURRENT_TG_ARN" != "$BLUE_TG_ARN" ]; then
            echo "❌ Listener is not pointing to Blue TG!"
            exit 1
          fi
          echo "✅ Listener → Blue TG confirmed"

          ALL_ASGS=$(aws autoscaling describe-auto-scaling-groups \
            --query 'AutoScalingGroups[?starts_with(AutoScalingGroupName, `klosetlab-app-`)].AutoScalingGroupName' \
            --output json)

          BLUE_ASG="none"
          for asg in $(echo "$ALL_ASGS" | jq -r '.[]'); do
            TG_ARNS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$asg" \
              --query 'AutoScalingGroups[0].TargetGroupARNs' \
              --output json)
            if echo "$TG_ARNS" | jq -e --arg tg "$BLUE_TG_ARN" 'index($tg)' > /dev/null; then
              BLUE_ASG="$asg"
              break
            fi
          done

          echo "blue_asg=${BLUE_ASG}" >> $GITHUB_OUTPUT

          if [ "$BLUE_ASG" != "none" ]; then
            DESIRED=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${BLUE_ASG} \
              --query 'AutoScalingGroups[0].DesiredCapacity' --output text)
            MIN=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${BLUE_ASG} \
              --query 'AutoScalingGroups[0].MinSize' --output text)
            MAX=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${BLUE_ASG} \
              --query 'AutoScalingGroups[0].MaxSize' --output text)
            echo "desired=${DESIRED}" >> $GITHUB_OUTPUT
            echo "min=${MIN}" >> $GITHUB_OUTPUT
            echo "max=${MAX}" >> $GITHUB_OUTPUT
          else
            echo "desired=1" >> $GITHUB_OUTPUT
            echo "min=1" >> $GITHUB_OUTPUT
            echo "max=2" >> $GITHUB_OUTPUT
          fi

      - name: Generate API User Data script
        id: userdata
        run: |
          chmod +x .github/scripts/generate-userdata.sh
          .github/scripts/generate-userdata.sh \
            "prod" \
            "${{ steps.image.outputs.image_uri }}" \
            "${{ env.AWS_REGION }}"

      - name: Create new Green Launch Template version
        id: new-lt
        run: |
          LT_ID="${{ secrets.PROD_LAUNCH_TEMPLATE_ID }}"
          USER_DATA="${{ steps.userdata.outputs.user_data_base64 }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          NEW_LT_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id ${LT_ID} \
            --source-version '$Latest' \
            --launch-template-data "{
              \"UserData\": \"${USER_DATA}\",
              \"TagSpecifications\": [{
                \"ResourceType\": \"instance\",
                \"Tags\": [
                  {\"Key\": \"Name\", \"Value\": \"klosetlab-app-green-${TIMESTAMP}\"},
                  {\"Key\": \"Environment\", \"Value\": \"production\"},
                  {\"Key\": \"Service\", \"Value\": \"api\"},
                  {\"Key\": \"ImageTag\", \"Value\": \"${{ steps.image.outputs.image_tag }}\"}
                ]
              }]
            }" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)

          echo "new_lt_version=${NEW_LT_VERSION}" >> $GITHUB_OUTPUT

      - name: Create Green ASG
        id: green-asg
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          GREEN_ASG_NAME="klosetlab-app-green-${TIMESTAMP}"
          GREEN_TG_ARN="${{ steps.blue-check.outputs.green_tg_arn }}"

          aws autoscaling create-auto-scaling-group \
            --auto-scaling-group-name ${GREEN_ASG_NAME} \
            --launch-template "LaunchTemplateId=${{ secrets.PROD_LAUNCH_TEMPLATE_ID }},Version=${{ steps.new-lt.outputs.new_lt_version }}" \
            --min-size ${{ steps.blue-check.outputs.min }} \
            --max-size ${{ steps.blue-check.outputs.max }} \
            --desired-capacity ${{ steps.blue-check.outputs.desired }} \
            --target-group-arns ${GREEN_TG_ARN} \
            --vpc-zone-identifier "${{ secrets.PROD_SUBNET_IDS }}" \
            --health-check-type ELB \
            --health-check-grace-period 180 \
            --tags "Key=Name,Value=klosetlab-app-green,PropagateAtLaunch=true" \
                   "Key=Environment,Value=production,PropagateAtLaunch=true" \
                   "Key=Service,Value=api,PropagateAtLaunch=true" \
                   "Key=ImageTag,Value=${{ steps.image.outputs.image_tag }},PropagateAtLaunch=true"

          echo "green_asg_name=${GREEN_ASG_NAME}" >> $GITHUB_OUTPUT

      - name: Wait for Green ASG to be ready
        timeout-minutes: 20
        run: |
          GREEN_ASG="${{ steps.green-asg.outputs.green_asg_name }}"
          GREEN_TG_ARN="${{ steps.blue-check.outputs.green_tg_arn }}"
          EXPECTED=${{ steps.blue-check.outputs.desired }}

          MAX_RETRIES=120
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HEALTHY_INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${GREEN_ASG} \
              --query 'AutoScalingGroups[0].Instances[?HealthStatus==`Healthy` && LifecycleState==`InService`]' \
              --output json | jq 'length')

            NEW_INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${GREEN_ASG} \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
              --output json)

            HEALTHY_TARGETS=0
            for instance_id in $(echo "$NEW_INSTANCE_IDS" | jq -r '.[]'); do
              STATE=$(aws elbv2 describe-target-health \
                --target-group-arn ${GREEN_TG_ARN} \
                --targets Id=${instance_id} \
                --query 'TargetHealthDescriptions[0].TargetHealth.State' \
                --output text 2>/dev/null || echo "unknown")
              if [ "$STATE" = "healthy" ]; then
                HEALTHY_TARGETS=$((HEALTHY_TARGETS + 1))
              fi
            done

            echo "[$((RETRY_COUNT + 1))/$MAX_RETRIES] Healthy: ${HEALTHY_INSTANCES} instances, ${HEALTHY_TARGETS} targets (expected: ${EXPECTED})"

            if [ "$HEALTHY_INSTANCES" -ge "$EXPECTED" ] && [ "$HEALTHY_TARGETS" -ge "$EXPECTED" ]; then
              echo "✅ Green ASG is ready!"
              exit 0
            fi

            sleep 10
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          echo "❌ Green ASG failed to become healthy"
          exit 1

      - name: Switch traffic Blue → Green
        id: traffic-switch
        run: |
          API_RULE_ARN="${{ steps.blue-check.outputs.api_rule_arn }}"
          BLUE_TG_ARN="${{ steps.blue-check.outputs.blue_tg_arn }}"
          GREEN_TG_ARN="${{ steps.blue-check.outputs.green_tg_arn }}"

          aws elbv2 modify-rule \
            --rule-arn ${API_RULE_ARN} \
            --actions "[{
              \"Type\": \"forward\",
              \"ForwardConfig\": {
                \"TargetGroups\": [
                  {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 0},
                  {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 100}
                ]
              }
            }]"

          echo "✅ Traffic switched: Blue(0%) → Green(100%)"
          echo "traffic_switched=true" >> $GITHUB_OUTPUT

      - name: Remove Blue ASG
        if: success() && steps.blue-check.outputs.blue_asg != 'none'
        run: |
          BLUE_ASG="${{ steps.blue-check.outputs.blue_asg }}"

          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${BLUE_ASG} \
            --min-size 0 --max-size 0 --desired-capacity 0

          sleep 30

          aws autoscaling delete-auto-scaling-group \
            --auto-scaling-group-name ${BLUE_ASG} \
            --force-delete

          echo "✅ Blue ASG removed: ${BLUE_ASG}"

      - name: Rollback on failure
        if: failure()
        run: |
          API_RULE_ARN="${{ steps.blue-check.outputs.api_rule_arn }}"
          BLUE_TG_ARN="${{ steps.blue-check.outputs.blue_tg_arn }}"
          GREEN_TG_ARN="${{ steps.blue-check.outputs.green_tg_arn }}"

          # 트래픽이 이미 전환된 경우 원복
          if [ "${{ steps.traffic-switch.outputs.traffic_switched }}" = "true" ]; then
            aws elbv2 modify-rule \
              --rule-arn ${API_RULE_ARN} \
              --actions "[{
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {\"TargetGroupArn\": \"${BLUE_TG_ARN}\", \"Weight\": 100},
                    {\"TargetGroupArn\": \"${GREEN_TG_ARN}\", \"Weight\": 0}
                  ]
                }
              }]" || true
            echo "⚠️ Traffic reverted to Blue"
          fi

          # Green ASG 삭제
          GREEN_ASG="${{ steps.green-asg.outputs.green_asg_name }}"
          if [ -n "$GREEN_ASG" ]; then
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name ${GREEN_ASG} \
              --min-size 0 --max-size 0 --desired-capacity 0 || true
            sleep 10
            aws autoscaling delete-auto-scaling-group \
              --auto-scaling-group-name ${GREEN_ASG} \
              --force-delete || true
          fi

          echo "⚠️ API Prod Rollback completed"

      - name: Send Discord notification on success
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          embed-title: "✅ [API] Production 배포 성공 (Blue → Green)"
          embed-description: |
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            **Green ASG:** `${{ steps.green-asg.outputs.green_asg_name }}`
            **Blue ASG (삭제됨):** `${{ steps.blue-check.outputs.blue_asg }}`
            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 3066993

      - name: Send Discord notification on failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Backend CD Bot"
          embed-title: "❌ [API] Production 배포 실패 - 롤백됨"
          embed-description: |
            **이미지:** `${{ steps.image.outputs.image_tag }}`
            [📋 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: 15158332

  # ============================================================
  # Production Chat 배포 (main 브랜치)
  # Blue/Green 방식
  # ============================================================
  deploy-prod-chat:
    name: Deploy Chat to Production
