server:
  address: 127.0.0.1
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_URL}:${MYSQL_PORT}/${MYSQL_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/kloset}

jwt:
  access-token-expiration: 43200000      # 12시간 (ms)
  refresh-token-expiration: 604800000   # 1주일 (ms)

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:}
    stack:
      auto: false

cors:
  allowed-origins:
    - http://localhost:3000
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers:
    - '*'
  allow-credentials: true
  max-age: 3600

cdn:
  base-url: https://${AWS_S3_BUCKET:}.s3.ap-northeast-2.amazonaws.com
